<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>دفتر معاملات حرفه‌ای</title>

<style>
  body {
    margin: 0;
    font-family: Tahoma;
    background: #0b1220;
    color: #fff;
    padding: 20px;
  }

  .box {
    max-width: 750px;
    margin: auto;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  h1 { text-align:center; }

  input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    margin-bottom: 14px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #0f172a;
    color: #fff;
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    font-weight: bold;
    cursor: pointer;
  }

  button:disabled {
    opacity: 0.5;
  }

  .preview img {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
    display: none;
  }

  .msg {
    margin-top: 10px;
    font-size: 14px;
  }

  .ok { color: #22c55e; }
  .err { color: #ef4444; }
</style>
</head>

<body>

<div class="box">
  <h1>📒 دفتر معاملات</h1>

  <form id="form">

    <label>تاریخ</label>
    <input type="date" name="date" required>

    <label>نماد</label>
    <input type="text" name="symbol" required>

    <label>جهت</label>
    <input type="text" name="side" required>

    <label>ورود</label>
    <input type="number" step="any" name="entry" required>

    <label>حد ضرر</label>
    <input type="number" step="any" name="sl" required>

    <label>توضیحات</label>
    <textarea name="reason" required></textarea>

    <label>تصویر چارت</label>
    <input type="file" id="file" accept="image/*">

    <div class="preview">
      <img id="img">
    </div>

    <div class="msg" id="status"></div>

    <input type="hidden" name="chart" id="chartUrl">

    <button id="btn">ثبت معامله</button>

    <div class="msg ok" id="ok"></div>
    <div class="msg err" id="err"></div>

  </form>
</div>

<script>
const CLOUD_NAME = "YOUR_CLOUD_NAME";
const UPLOAD_PRESET = "YOUR_UPLOAD_PRESET";

const form = document.getElementById("form");
const file = document.getElementById("file");
const img = document.getElementById("img");
const chartUrl = document.getElementById("chartUrl");

const status = document.getElementById("status");
const btn = document.getElementById("btn");

const ok = document.getElementById("ok");
const err = document.getElementById("err");

let uploadedUrl = "";

file.addEventListener("change", () => {
  const f = file.files[0];
  if (!f) return;

  if (f.size > 5 * 1024 * 1024) {
    alert("حداکثر 5MB");
    file.value = "";
    return;
  }

  const reader = new FileReader();
  reader.onload = e => {
    img.src = e.target.result;
    img.style.display = "block";
  };
  reader.readAsDataURL(f);
});

async function uploadImage(file) {
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", UPLOAD_PRESET);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
    { method: "POST", body: fd }
  );

  const data = await res.json();

  if (!res.ok || !data.secure_url) {
    throw new Error(data.error?.message || "خطا در آپلود تصویر");
  }

  return data.secure_url;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  ok.textContent = "";
  err.textContent = "";

  btn.disabled = true;
  btn.textContent = "در حال ارسال...";

  try {
    const f = file.files[0];

    // 1) آپلود تصویر (اگر وجود داشت)
    if (f && !uploadedUrl) {
      status.textContent = "در حال آپلود تصویر...";

      uploadedUrl = await uploadImage(f);

      chartUrl.value = uploadedUrl;

      status.textContent = "✅ تصویر آپلود شد";
    }

    // 2) ارسال فرم
    const res = await fetch("https://formspree.io/f/mqeovdwz", {
      method: "POST",
      body: new FormData(form),
      headers: { Accept: "application/json" }
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      throw new Error(data?.error || "خطا در ارسال فرم");
    }

    ok.textContent = "✅ معامله با موفقیت ثبت شد";

    form.reset();
    img.style.display = "none";
    status.textContent = "";
    uploadedUrl = "";

  } catch (e) {
    console.error(e);
    err.textContent = "❌ " + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = "ثبت معامله";
  }
});
</script>

</body>
</html>
