<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دفتر معاملات</title>

  <style>
    body {
      font-family: Tahoma, sans-serif;
      background: #f5f1e8;
      color: #2b2620;
      max-width: 700px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
    }

    .field {
      margin-bottom: 15px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbbd9d;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 14px;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2b2620;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
    }

    #success {
      display: none;
      margin-top: 15px;
      padding: 12px;
      background: #dff5e5;
      color: #1f6a38;
      border-radius: 8px;
    }

    #error {
      display: none;
      margin-top: 15px;
      padding: 12px;
      background: #fde2e2;
      color: #a12828;
      border-radius: 8px;
    }

    #preview {
      display: none;
      max-width: 100%;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>📒 دفتر معاملات</h1>

<form id="tradeForm">

  <div class="field">
    <label>تاریخ معامله</label>
    <input type="date" name="date" required>
  </div>

  <div class="field">
    <label>نماد</label>
    <input type="text" name="symbol" placeholder="BTCUSDT" required>
  </div>

  <div class="field">
    <label>جهت معامله</label>
    <select name="direction" required>
      <option value="">انتخاب کنید</option>
      <option value="buy">خرید</option>
      <option value="sell">فروش</option>
    </select>
  </div>

  <div class="field">
    <label>نقطه ورود</label>
    <input type="number" name="entry" step="any" required>
  </div>

  <div class="field">
    <label>حد ضرر</label>
    <input type="number" name="stoploss" step="any" required>
  </div>

  <div class="field">
    <label>حد سود</label>
    <input type="number" name="takeprofit" step="any">
  </div>

  <div class="field">
    <label>دلیل ورود</label>
    <textarea name="reason" required></textarea>
  </div>

  <div class="field">
    <label>آپلود تصویر معامله</label>
    <input type="file" name="image" accept="image/*">
    <img id="preview">
  </div>

  <input type="hidden" name="_subject" value="New Trade">

  <button type="submit" id="btn">ارسال</button>

</form>

<div id="success">✅ معامله ثبت شد</div>
<div id="error"></div>

<script>
const form = document.getElementById("tradeForm");
const btn = document.getElementById("btn");
const success = document.getElementById("success");
const error = document.getElementById("error");
const fileInput = document.querySelector('input[type="file"]');
const preview = document.getElementById("preview");

// preview image
fileInput.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  btn.disabled = true;
  btn.textContent = "در حال ارسال...";

  success.style.display = "none";
  error.style.display = "none";

  const formData = new FormData(form);

  try {
    const res = await fetch("https://formspree.io/f/mqeovdwz", {
      method: "POST",
      body: formData,
      headers: {
        Accept: "application/json"
      }
    });

    const data = await res.json();

    if (res.ok) {
      form.reset();
      preview.style.display = "none";
      success.style.display = "block";
    } else {
      error.style.display = "block";
      error.textContent = data.errors?.[0]?.message || "خطا در ارسال";
    }

  } catch {
    error.style.display = "block";
    error.textContent = "مشکل در اتصال";
  }

  btn.disabled = false;
  btn.textContent = "ارسال";
});
</script>

</body>
</html>
