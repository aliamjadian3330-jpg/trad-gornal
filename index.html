<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دفتر معاملات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#1f2a24;
    --paper:#f3efe2;
    --card:#fffdf7;
    --line:#dcd3b8;
    --moss:#3c6e52;
    --moss-dark:#2a4d3a;
    --gold:#b8893f;
    --rose:#a8453a;
    --muted:#8b8270;
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  body{
    font-family:'Vazirmatn',Tahoma,sans-serif;
    background:
      radial-gradient(circle at 15% 0%, rgba(60,110,82,.07), transparent 45%),
      radial-gradient(circle at 100% 100%, rgba(184,137,63,.08), transparent 45%),
      var(--paper);
    color:var(--ink);
    padding:32px 16px;
    line-height:1.8;
    min-height:100vh;
  }

  .container{
    max-width:680px;
    margin:auto;
  }

  .ledger-header{
    text-align:center;
    margin-bottom:28px;
  }

  .ledger-header .mark{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:54px;height:54px;
    border-radius:50%;
    background:var(--moss-dark);
    color:#f3efe2;
    font-size:24px;
    margin-bottom:14px;
    box-shadow:0 6px 16px rgba(42,77,58,.25);
  }

  h1{
    font-size:26px;
    font-weight:800;
    letter-spacing:-.3px;
  }

  .subtitle{
    color:var(--muted);
    margin-top:6px;
    font-size:14px;
  }

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:28px;
    box-shadow:0 10px 30px rgba(43,38,32,.05);
  }

  .section-label{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:13px;
    font-weight:700;
    color:var(--moss-dark);
    letter-spacing:.3px;
    margin:30px 0 16px;
  }

  .section-label:first-child{margin-top:0;}

  .section-label::after{
    content:"";
    flex:1;
    height:1px;
    background:linear-gradient(to left, var(--line), transparent);
  }

  .field{margin-bottom:16px;}

  .row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }

  label{
    display:block;
    margin-bottom:7px;
    font-weight:600;
    font-size:13.5px;
    color:#46453c;
  }

  label .opt{
    font-weight:400;
    color:var(--muted);
    font-size:12px;
  }

  input[type="text"],
  input[type="date"],
  input[type="number"],
  input[type="url"],
  select,
  textarea{
    width:100%;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:10px;
    font-size:14px;
    font-family:inherit;
    background:#fffefb;
    color:var(--ink);
    transition:border-color .15s, box-shadow .15s;
  }

  input:focus, textarea:focus, select:focus{
    outline:none;
    border-color:var(--moss);
    box-shadow:0 0 0 3px rgba(60,110,82,.12);
  }

  input::placeholder, textarea::placeholder{color:#b5ad99;}

  textarea{min-height:110px;resize:vertical;}

  .radio-group{
    display:flex;
    gap:10px;
  }

  .radio-pill{
    flex:1;
    position:relative;
  }

  .radio-pill input{
    position:absolute;
    opacity:0;
    inset:0;
    cursor:pointer;
  }

  .radio-pill span{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:12px;
    border:1px solid var(--line);
    border-radius:10px;
    font-weight:600;
    font-size:14px;
    color:var(--muted);
    background:#fffefb;
    transition:all .15s;
  }

  .radio-pill input:checked + span{
    border-color:var(--moss);
    color:#fff;
    background:var(--moss);
    box-shadow:0 4px 12px rgba(60,110,82,.25);
  }

  .radio-pill:nth-child(2) input:checked + span{
    background:var(--rose);
    border-color:var(--rose);
    box-shadow:0 4px 12px rgba(168,69,58,.25);
  }

  /* Link box - the new section */
  .link-box{
    background:linear-gradient(160deg, #fbf8ee, #f5efdc);
    border:1px dashed var(--gold);
    border-radius:12px;
    padding:18px 16px;
  }

  .link-box .link-row{
    display:flex;
    gap:10px;
  }

  .link-box input[type="url"]{
    flex:1;
  }

  .link-box .link-hint{
    font-size:12px;
    color:var(--muted);
    margin-top:8px;
  }

  .chip-list{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
  }

  .chip{
    display:flex;
    align-items:center;
    gap:6px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:999px;
    padding:6px 12px;
    font-size:12.5px;
    font-family:'JetBrains Mono', monospace;
    color:var(--moss-dark);
    direction:ltr;
  }

  .chip button{
    all:unset;
    cursor:pointer;
    color:var(--rose);
    font-weight:700;
    line-height:1;
  }

  .file-drop{
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    background:#fffefb;
    cursor:pointer;
  }

  .file-drop input{display:none;}

  .file-drop-label{
    display:flex;
    align-items:center;
    gap:10px;
    color:var(--muted);
    font-size:13.5px;
  }

  .status{
    margin-top:8px;
    font-size:13px;
    color:var(--moss-dark);
    font-weight:600;
  }

  .preview{
    display:none;
    margin-top:14px;
  }

  .preview img{
    max-width:100%;
    border-radius:10px;
    border:1px solid var(--line);
  }

  button.submit{
    width:100%;
    padding:15px;
    margin-top:26px;
    background:var(--moss-dark);
    color:#fff;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:700;
    font-family:inherit;
    letter-spacing:.2px;
    transition:transform .12s, box-shadow .12s;
    box-shadow:0 8px 20px rgba(42,77,58,.25);
  }

  button.submit:hover{transform:translateY(-1px);}
  button.submit:disabled{opacity:.6;cursor:not-allowed;transform:none;}

  .success, .error{
    display:none;
    margin-top:18px;
    padding:14px 16px;
    border-radius:10px;
    font-size:14px;
    font-weight:600;
  }

  .success{background:#e1f3e7;color:#1f6b3f;border:1px solid #b9e2c6;}
  .error{background:#fbe4e2;color:#a3392c;border:1px solid #f3c2bd;}

  @media (max-width:480px){
    .row{grid-template-columns:1fr;}
    .card{padding:20px;}
  }
</style>
</head>
<body>

<div class="container">

  <div class="ledger-header">
    <div class="mark">📒</div>
    <h1>دفتر معاملات</h1>
    <p class="subtitle">ثبت معامله، آپلود چارت و ارسال لینک</p>
  </div>

  <div class="card">
    <form id="tradeForm">

      <div class="section-label">اطلاعات معامله</div>

      <div class="row">
        <div class="field">
          <label>تاریخ معامله *</label>
          <input type="date" name="تاریخ معامله" required>
        </div>
        <div class="field">
          <label>نماد *</label>
          <input type="text" name="نماد" placeholder="BTCUSDT" required>
        </div>
      </div>

      <div class="field">
        <label>جهت معامله *</label>
        <div class="radio-group">
          <label class="radio-pill">
            <input type="radio" name="جهت معامله" value="خرید" required>
            <span>📈 خرید</span>
          </label>
          <label class="radio-pill">
            <input type="radio" name="جهت معامله" value="فروش">
            <span>📉 فروش</span>
          </label>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>نقطه ورود *</label>
          <input type="number" step="any" name="نقطه ورود" required>
        </div>
        <div class="field">
          <label>حد ضرر *</label>
          <input type="number" step="any" name="حد ضرر" required>
        </div>
      </div>

      <div class="field">
        <label>حد سود <span class="opt">(اختیاری)</span></label>
        <input type="number" step="any" name="حد سود">
      </div>

      <div class="field">
        <label>دلیل ورود *</label>
        <textarea name="دلیل ورود" placeholder="چرا وارد معامله شدی؟" required></textarea>
      </div>

      <div class="section-label">📎 ارسال لینک</div>

      <div class="link-box">
        <div class="link-row">
          <input type="url" id="linkInput" placeholder="https://www.tradingview.com/x/...">
          <button type="button" class="submit" id="addLinkBtn" style="width:auto;margin:0;padding:12px 18px;font-size:13.5px;">افزودن</button>
        </div>
        <div class="link-hint">لینک چارت، تحلیل یا هر مرجع مرتبط با این معامله را اینجا اضافه کن.</div>
        <div class="chip-list" id="linkList"></div>
      </div>

      <input type="hidden" name="لینک‌های ضمیمه" id="linksField">

      <div class="section-label">تصویر چارت</div>

      <div class="field">
        <label class="file-drop">
          <input type="file" id="chartImage" accept="image/png,image/jpeg,image/webp">
          <div class="file-drop-label">🖼️ <span>برای آپلود تصویر چارت کلیک کن</span></div>
        </label>
        <div class="status" id="uploadStatus"></div>
        <div class="preview" id="previewBox">
          <img id="previewImage" alt="پیش‌نمایش">
        </div>
      </div>

      <input type="hidden" name="لینک چارت" id="chartUrl">
      <input type="hidden" name="_subject" value="📒 معامله جدید">

      <button class="submit" id="submitBtn" type="submit">ثبت و ارسال</button>

    </form>

    <div class="success" id="successBox">✅ معامله با موفقیت ثبت شد.</div>
    <div class="error" id="errorBox"></div>
  </div>

</div>

<script>
  const CLOUD_NAME = "YOUR_CLOUD_NAME";
  const UPLOAD_PRESET = "YOUR_UPLOAD_PRESET";

  const form = document.getElementById("tradeForm");
  const fileInput = document.getElementById("chartImage");
  const chartUrl = document.getElementById("chartUrl");

  const submitBtn = document.getElementById("submitBtn");
  const uploadStatus = document.getElementById("uploadStatus");

  const previewBox = document.getElementById("previewBox");
  const previewImage = document.getElementById("previewImage");

  const successBox = document.getElementById("successBox");
  const errorBox = document.getElementById("errorBox");

  // --- new: link list logic ---
  const linkInput = document.getElementById("linkInput");
  const addLinkBtn = document.getElementById("addLinkBtn");
  const linkList = document.getElementById("linkList");
  const linksField = document.getElementById("linksField");

  let links = [];

  function renderLinks() {
    linkList.innerHTML = "";
    links.forEach((url, i) => {
      const chip = document.createElement("div");
      chip.className = "chip";
      const short = url.length > 38 ? url.slice(0, 35) + "…" : url;
      chip.innerHTML = `<span>${short}</span>`;
      const removeBtn = document.createElement("button");
      removeBtn.type = "button";
      removeBtn.textContent = "×";
      removeBtn.addEventListener("click", () => {
        links.splice(i, 1);
        renderLinks();
      });
      chip.appendChild(removeBtn);
      linkList.appendChild(chip);
    });
    linksField.value = links.join(", ");
  }

  function addLink() {
    const value = linkInput.value.trim();
    if (!value) return;
    try {
      new URL(value);
    } catch {
      alert("لینک معتبر وارد کن.");
      return;
    }
    links.push(value);
    linkInput.value = "";
    renderLinks();
  }

  addLinkBtn.addEventListener("click", addLink);
  linkInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      addLink();
    }
  });

  // --- existing: image upload preview ---
  fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    if (!file) return;

    if (file.size > 10 * 1024 * 1024) {
      alert("حداکثر حجم فایل ۱۰ مگابایت است.");
      fileInput.value = "";
      return;
    }

    const reader = new FileReader();
    reader.onload = function(event) {
      previewImage.src = event.target.result;
      previewBox.style.display = "block";
    };
    reader.readAsDataURL(file);
  });

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    successBox.style.display = "none";
    errorBox.style.display = "none";

    submitBtn.disabled = true;
    submitBtn.textContent = "در حال ارسال...";

    try {
      const file = fileInput.files[0];

      if (file) {
        uploadStatus.textContent = "در حال آپلود تصویر...";

        const imageData = new FormData();
        imageData.append("file", file);
        imageData.append("upload_preset", UPLOAD_PRESET);

        const uploadResponse = await fetch(
          `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
          { method: "POST", body: imageData }
        );

        const uploadResult = await uploadResponse.json();

        if (!uploadResponse.ok) {
          throw new Error(uploadResult.error?.message || "خطا در آپلود تصویر");
        }

        chartUrl.value = uploadResult.secure_url;
        uploadStatus.textContent = "✅ تصویر آپلود شد.";
      }

      const formData = new FormData(form);

      const response = await fetch("https://formspree.io/f/mqeovdwz", {
        method: "POST",
        body: formData,
        headers: { "Accept": "application/json" }
      });

      const result = await response.json();

      if (!response.ok) {
        throw new Error(
          result.errors?.map(item => item.message).join(" | ") || "خطا در ارسال فرم"
        );
      }

      form.reset();
      previewBox.style.display = "none";
      chartUrl.value = "";
      uploadStatus.textContent = "";
      links = [];
      renderLinks();

      successBox.style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });

    } catch (error) {
      errorBox.textContent = error.message;
      errorBox.style.display = "block";
      console.error(error);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "ثبت و ارسال";
    }
  });
</script>

</body>
</html>
