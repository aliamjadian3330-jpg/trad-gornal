<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<title>ژورنال ترید حرفه‌ای</title>

<link rel="stylesheet" href="https://unpkg.com/persian-datepicker@1.2.0/dist/css/persian-datepicker.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap');

body{
  margin:0;
  font-family:Vazirmatn;
  background: radial-gradient(circle at top,#0b0b1a,#05050a);
  color:white;
  display:flex;
  justify-content:center;
  padding:30px;
}

/* CARD */
.card{
  width:520px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(25px);
  border-radius:25px;
  padding:25px;
  box-shadow:0 0 60px rgba(0,255,120,0.08);
  animation:fade 1s ease;
}

/* TITLE */
h2{
  text-align:right;
  color:#00e676;
  margin-bottom:20px;
}

/* LABEL */
label{
  display:block;
  text-align:right;
  font-size:12px;
  color:#aaa;
  margin-top:8px;
}

/* INPUTS */
input,textarea{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  color:white;
  outline:none;
  text-align:right;
  transition:0.3s;
  font-family:Vazirmatn;
}

input:focus,textarea:focus{
  background:rgba(255,255,255,0.15);
  transform:scale(1.02);
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:15px;
  background:linear-gradient(135deg,#00c853,#64dd17);
  font-weight:bold;
  cursor:pointer;
  margin-top:12px;
  transition:0.3s;
}

button:hover{
  box-shadow:0 0 25px #00e676;
  transform:scale(1.03);
}

/* ALERT */
#alert{
  text-align:center;
  margin-top:10px;
  font-size:14px;
}

/* ANIMATION */
@keyframes fade{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* PLACEHOLDER RTL FIX */
input::placeholder,textarea::placeholder{
  text-align:right;
}
</style>
</head>

<body>

<div class="card">

<h2>📊 ژورنال ترید  سبک ISIحرفه‌ای</h2>

<label>📅 تاریخ شمسی</label>
<input type="text" id="date" placeholder="انتخاب تاریخ">

<label>💱 نماد</label>
<input id="symbol" placeholder="BTCUSD">

<label>⏱ تایم‌فریم</label>
<input id="timeframe" placeholder="M5 / H1 / D1">

<label>📌 جهت معامله</label>
<input id="direction" placeholder="Buy / Sell">

<label>📦 حجم</label>
<input id="lot" placeholder="Lot Size">

<label>📥 ورود</label>
<input id="entry" placeholder="Price Entry">

<label>📤 خروج</label>
<input id="exit" placeholder="Price Exit">

<label>💰 سود / ضرر</label>
<input id="profit" placeholder="Profit / Loss">

<label>🧠 دلیل ورود</label>
<textarea id="entry_reason"></textarea>

<label>📊 استراتژی</label>
<textarea id="strategy"></textarea>

<label>⚖ ریسک به ریوارد</label>
<input id="risk_reward" placeholder="1:3">

<label>📉 درصد ریسک</label>
<input id="risk_percent" placeholder="1%">

<label>😐 احساسات</label>
<input id="emotion_before" placeholder="قبل معامله">
<input id="emotion_during" placeholder="حین معامله">
<input id="emotion_after" placeholder="بعد معامله">

<label>❌ اشتباهات</label>
<textarea id="mistakes"></textarea>

<label>⭐ امتیاز اجرا</label>
<input id="execution_score" placeholder="1 تا 10">

<label>📝 نتیجه تحلیل</label>
<textarea id="result_note"></textarea>

<label>📷 لینک چارت</label>
<input id="chart" placeholder="TradingView link">

<button onclick="send()">ثبت ژورنال</button>

<div id="alert"></div>

</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/persian-date/dist/persian-date.min.js"></script>
<script src="https://unpkg.com/persian-datepicker@1.2.0/dist/js/persian-datepicker.min.js"></script>

<script>
const API = "https://script.google.com/macros/s/AKfycbwVhZcuF5P4kDd9p14m30vIdQuovPVbjL1JZ28eV9v_tHUXPOadr5rxP_AtzBKfajtVKA/exec";

$(document).ready(function(){
  $("#date").pDatepicker({
    format: "YYYY/MM/DD",
    autoClose: true
  });
});

function show(msg,color){
  let a=document.getElementById("alert");
  a.innerText=msg;
  a.style.color=color;
}

async function send(){

  show("در حال ارسال...", "#ffeb3b");

  let data = {
    date: date.value,
    symbol: symbol.value,
    timeframe: timeframe.value,
    direction: direction.value,
    lot: lot.value,
    entry: entry.value,
    exit: exit.value,
    profit: profit.value,
    chart: chart.value,

    entry_reason: entry_reason.value,
    strategy: strategy.value,
    risk_reward: risk_reward.value,
    risk_percent: risk_percent.value,

    emotion_before: emotion_before.value,
    emotion_during: emotion_during.value,
    emotion_after: emotion_after.value,

    mistakes: mistakes.value,
    execution_score: execution_score.value,
    result_note: result_note.value
  };

  try{
    await fetch(API,{
      method:"POST",
      body:JSON.stringify(data)
    });

    show("✔ ژورنال ثبت شد", "#00e676");

    document.querySelectorAll("input,textarea").forEach(i=>i.value="");

  }catch(e){
    show("❌ خطا در ارسال", "red");
  }
}
</script>

</body>
</html>
